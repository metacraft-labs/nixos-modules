name: 'Terraform CI'

on:
  workflow_call:
    inputs:
      mode:
        description: 'Workflow mode: "pr" (offline + plan), "apply" (apply on merge), "drift" (scheduled drift check)'
        type: string
        required: true

      working_directory:
        description: 'Directory containing .tf files (e.g. "cloudflare")'
        type: string
        required: true

      backend_config_file:
        description: 'Path to backend config file relative to repo root (e.g. "backends/gcs.hcl")'
        type: string
        required: false
        default: ''

      runner:
        description: 'JSON-encoded runner labels for self-hosted runner'
        type: string
        required: false
        default: '["self-hosted", "Linux", "x86-64-v2"]'

      provider_allowlist:
        description: 'Comma-separated list of allowed provider source prefixes for denylist check (e.g. "cloudflare,google")'
        type: string
        required: false
        default: ''

      sensitive_change_label:
        description: 'PR label required for sensitive changes (e.g. "sensitive-change"). Empty to disable.'
        type: string
        required: false
        default: ''

      smoke_test_command:
        description: 'Command to run as post-apply smoke test. Empty to skip.'
        type: string
        required: false
        default: ''

      environment_name:
        description: 'GitHub Environment used by apply jobs as the credential boundary for the target branch.'
        type: string
        required: false
        default: 'production'

      terranix:
        description: 'Run terranix to generate .tf.json before tofu init'
        type: boolean
        required: false
        default: false

      enable_checkov:
        description: 'Enable Checkov security scanning'
        type: boolean
        required: false
        default: false

      credentials_env_name:
        description: 'Environment variable name for the provider API token (e.g. "CLOUDFLARE_API_TOKEN")'
        type: string
        required: false
        default: ''

      agenix_plan_secret_path:
        description: 'Path to agenix-encrypted plan (read-only) token relative to repo root'
        type: string
        required: false
        default: ''

      agenix_apply_secret_path:
        description: 'Path to agenix-encrypted apply (read-write) token relative to repo root'
        type: string
        required: false
        default: ''

      aws_region:
        description: 'AWS region used when assuming AWS OIDC roles'
        type: string
        required: false
        default: 'us-east-1'

      aws_plan_role_arn:
        description: 'AWS IAM role ARN to assume for PR plans via GitHub OIDC'
        type: string
        required: false
        default: ''

      aws_apply_role_arn:
        description: 'AWS IAM role ARN to assume for applies via GitHub OIDC'
        type: string
        required: false
        default: ''

      aws_drift_role_arn:
        description: 'AWS IAM role ARN to assume for drift checks via GitHub OIDC; defaults to aws_plan_role_arn when empty'
        type: string
        required: false
        default: ''

      aws_role_duration_seconds:
        description: 'AWS STS role session duration for Terraform jobs'
        type: string
        required: false
        default: '3600'

    secrets:
      AGENIX_CI_PRIVATE_KEY:
        description: 'SSH private key for agenix secret decryption'
        required: false
      NIX_GITHUB_TOKEN:
        description: 'GitHub token for Nix flake fetches'
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Offline checks (no credentials required)
  # Runs in ALL modes: pr, apply, drift
  # All modes run on the configured self-hosted runner labels.
  # ---------------------------------------------------------------------------
  offline-checks:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Lockfile check
        run: |
          if [ ! -f "${{ inputs.working_directory }}/.terraform.lock.hcl" ]; then
            if [ "${{ inputs.mode }}" = "apply" ]; then
              echo "::error::.terraform.lock.hcl is missing in ${{ inputs.working_directory }}/. Run 'tofu init' locally and commit the lockfile."
              exit 1
            else
              echo "::warning::.terraform.lock.hcl is missing in ${{ inputs.working_directory }}/. Run 'tofu init' locally and commit the lockfile before merging."
            fi
          fi

      - name: Terranix
        if: inputs.terranix
        run: |
          cd ${{ inputs.working_directory }}
          NIXPKGS=$(nix eval --raw nixpkgs#path --inputs-from . --accept-flake-config)
          nix develop --accept-flake-config --command bash -c "terranix --pkgs '$NIXPKGS' > config.tf.json"

      - name: Format check
        run: nix develop --accept-flake-config --command tofu fmt -check -recursive ${{ inputs.working_directory }}/

      - name: Init (offline)
        run: |
          cd ${{ inputs.working_directory }}
          nix develop --accept-flake-config --command tofu init -backend=false

      - name: Validate
        run: |
          cd ${{ inputs.working_directory }}
          nix develop --accept-flake-config --command tofu validate

      - name: Denylist check
        run: |
          echo "Scanning ${{ inputs.working_directory }}/ for dangerous constructs..."
          exit_code=0

          # Check for dangerous constructs
          if grep -rn 'data\s*"external"' "${{ inputs.working_directory }}/" --include='*.tf' --include='*.tf.json'; then
            echo '::error::Denylist violation: data "external" block found. Use a provider data source instead.'
            exit_code=1
          fi

          if grep -rn 'provisioner\s*"local-exec"' "${{ inputs.working_directory }}/" --include='*.tf' --include='*.tf.json'; then
            echo '::error::Denylist violation: provisioner "local-exec" found. Use a provider resource instead.'
            exit_code=1
          fi

          if grep -rn 'provisioner\s*"remote-exec"' "${{ inputs.working_directory }}/" --include='*.tf' --include='*.tf.json'; then
            echo '::error::Denylist violation: provisioner "remote-exec" found. Use a provider resource instead.'
            exit_code=1
          fi

          if grep -rn 'resource\s*"null_resource"' "${{ inputs.working_directory }}/" --include='*.tf' --include='*.tf.json'; then
            echo '::error::Denylist violation: resource "null_resource" found. Use terraform_data or a provider resource instead.'
            exit_code=1
          fi

          # Check for unpinned remote module sources (module blocks without version constraint)
          # Match module blocks with source referencing a registry (contains //) but no version attribute
          while IFS= read -r -d '' tf_file; do
            # Extract module blocks and check for registry sources without version
            if awk '
              /^module\s/ { in_module=1; has_registry_source=0; has_version=0; block_start=NR; brace_depth=0 }
              in_module && /{/ { brace_depth++ }
              in_module && /}/ { brace_depth--; if (brace_depth<=0) { if (has_registry_source && !has_version) { print FILENAME ":" block_start ": module without version constraint"; found=1 } in_module=0 } }
              in_module && /source\s*=/ && /registry\.terraform\.io|\/\// { has_registry_source=1 }
              in_module && /version\s*=/ { has_version=1 }
              END { exit found ? 1 : 0 }
            ' "$tf_file" 2>/dev/null; then
              :
            else
              echo "::error::Denylist violation: unpinned remote module source found in $tf_file. Add a version constraint."
              exit_code=1
            fi
          done < <(find "${{ inputs.working_directory }}/" -name '*.tf' -print0)

          # Provider allowlist check
          ALLOWLIST="${{ inputs.provider_allowlist }}"
          if [ -n "$ALLOWLIST" ]; then
            echo "Checking provider sources against allowlist: $ALLOWLIST"
            while IFS= read -r -d '' tf_file; do
              while IFS= read -r line; do
                # Extract provider source from required_providers blocks
                provider_source="$(echo "$line" | grep -oP 'source\s*=\s*"\K[^"]+' || true)"
                if [ -n "$provider_source" ]; then
                  allowed=false
                  IFS=',' read -ra PROVIDERS <<< "$ALLOWLIST"
                  for p in "${PROVIDERS[@]}"; do
                    p="$(echo "$p" | xargs)" # trim whitespace
                    if echo "$provider_source" | grep -qi "$p"; then
                      allowed=true
                      break
                    fi
                  done
                  if [ "$allowed" = "false" ]; then
                    echo "::error::Provider source '$provider_source' in $tf_file is not in the allowlist ($ALLOWLIST)."
                    exit_code=1
                  fi
                fi
              done < <(grep -n 'source\s*=' "$tf_file" || true)
            done < <(find "${{ inputs.working_directory }}/" -name '*.tf' -print0)
          fi

          exit $exit_code

      - name: TFLint
        if: hashFiles(format('{0}/.tflint.hcl', inputs.working_directory)) != ''
        run: |
          cd ${{ inputs.working_directory }}
          nix develop --accept-flake-config --command tflint --init
          nix develop --accept-flake-config --command tflint

      - name: Checkov
        if: inputs.enable_checkov
        run: nix develop --accept-flake-config --command checkov -d ${{ inputs.working_directory }}/

      - name: Unit tests
        run: |
          cd ${{ inputs.working_directory }}
          nix develop --accept-flake-config --command tofu test

  # ---------------------------------------------------------------------------
  # Job 2: Credentialed plan (PR mode only, same-repo PRs only)
  # Fork PRs are excluded entirely — this is the fork-PR guard.
  # ---------------------------------------------------------------------------
  credentialed-plan:
    if: >-
      inputs.mode == 'pr'
      && github.event.pull_request.head.repo.full_name == github.repository
      && (inputs.credentials_env_name != '' || inputs.agenix_plan_secret_path != '' || inputs.aws_plan_role_arn != '')
    needs: offline-checks
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Decrypt provider credentials
        if: inputs.agenix_plan_secret_path != ''
        env:
          AGENIX_SECRET_PATH: ${{ inputs.agenix_plan_secret_path }}
          CREDENTIALS_ENV_NAME: ${{ inputs.credentials_env_name }}
        run: |
          set -euo pipefail

          if [ -z "$CREDENTIALS_ENV_NAME" ]; then
            echo "::error::credentials_env_name must be set when agenix_plan_secret_path is set."
            exit 1
          fi

          token_file="$(mktemp "$RUNNER_TEMP/provider-token.XXXXXX")"
          trap 'rm -f "$token_file"' EXIT

          install -m 600 /dev/null "$RUNNER_TEMP/ci-key"
          printf '%s\n' "${{ secrets.AGENIX_CI_PRIVATE_KEY }}" > "$RUNNER_TEMP/ci-key"
          if [ ! -s "$RUNNER_TEMP/ci-key" ]; then
            echo "::error::AGENIX_CI_PRIVATE_KEY is empty or unavailable."
            exit 1
          fi

          nix develop --accept-flake-config --command bash -euo pipefail -c \
            "age -d -i \"\$1\" \"\$2\" > \"\$3\"" \
            bash "$RUNNER_TEMP/ci-key" "$AGENIX_SECRET_PATH" "$token_file" >/dev/null

          TOKEN="$(<"$token_file")"
          if [ -z "$TOKEN" ]; then
            echo "::error::Decrypted provider credential is empty."
            exit 1
          fi
          if [[ "$TOKEN" == *$'\n'* || "$TOKEN" == *$'\r'* ]]; then
            echo "::error::Decrypted provider credential must be a single line."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          {
            printf '%s<<__MCL_TERRAFORM_SECRET__\n' "$CREDENTIALS_ENV_NAME"
            printf '%s\n' "$TOKEN"
            printf '__MCL_TERRAFORM_SECRET__\n'
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials for plan
        if: inputs.aws_plan_role_arn != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_plan_role_arn }}
          role-session-name: terraform-plan-${{ github.run_id }}
          role-duration-seconds: ${{ inputs.aws_role_duration_seconds }}

      - name: Lockfile existence gate
        run: |
          if [ ! -f "${{ inputs.working_directory }}/.terraform.lock.hcl" ]; then
            echo "::error::.terraform.lock.hcl is missing. Run 'tofu init' locally and commit the lockfile."
            exit 1
          fi

      - name: Terranix
        if: inputs.terranix
        run: |
          cd ${{ inputs.working_directory }}
          NIXPKGS=$(nix eval --raw nixpkgs#path --inputs-from . --accept-flake-config)
          nix develop --accept-flake-config --command bash -c "terranix --pkgs '$NIXPKGS' > config.tf.json"

      - name: Plan
        id: plan
        env:
          BACKEND_CONFIG_FILE: ${{ inputs.backend_config_file }}
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail

          backend_config_files="${BACKEND_CONFIG_FILE:-}"
          plan_id="$(printf '%s' "$WORKING_DIRECTORY" | tr '/[:space:]' '--')"
          plan_dir="$GITHUB_WORKSPACE/.result/terraform-plan/$plan_id"
          mkdir -p "$plan_dir"

          cd "$WORKING_DIRECTORY"

          backend_args=()
          while IFS= read -r backend_config_file; do
            [ -n "$backend_config_file" ] || continue
            if [[ "$backend_config_file" = /* ]]; then
              backend_path="$backend_config_file"
            else
              backend_path="$GITHUB_WORKSPACE/$backend_config_file"
            fi
            if [ ! -f "$backend_path" ]; then
              echo "::error::Backend config file does not exist: $backend_path"
              exit 1
            fi
            backend_args+=("-backend-config=$(realpath --relative-to="$PWD" "$backend_path")")
          done < <(printf '%s\n' "$backend_config_files" | tr ',' '\n')

          tofu_bin="$(nix develop --accept-flake-config --command bash -euo pipefail -c 'command -v tofu' | tail -n 1)"
          run_tofu() {
            env -u AWS_PROFILE -u AWS_DEFAULT_PROFILE "$tofu_bin" "$@"
          }

          run_tofu init -input=false "${backend_args[@]}"

          plan_bin="$plan_dir/plan.tfplan"
          plan_text="$plan_dir/plan.txt"
          plan_stderr="$plan_dir/plan.stderr"
          plan_json="$plan_dir/plan.json"

          set +e
          run_tofu plan \
            -input=false \
            -no-color \
            -lock=false \
            -detailed-exitcode \
            -out="$plan_bin" \
            >"$plan_text" 2>"$plan_stderr"
          plan_exit=$?
          set -e

          cat "$plan_text"
          cat "$plan_stderr" >&2

          if [ "$plan_exit" -eq 1 ]; then
            exit 1
          fi

          if [ "$plan_exit" -eq 0 ]; then
            echo "changes=false" >> "$GITHUB_OUTPUT"
          elif [ "$plan_exit" -eq 2 ]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Unexpected tofu plan exit code: $plan_exit"
            exit "$plan_exit"
          fi

          if [ -f "$plan_bin" ]; then
            run_tofu show -json "$plan_bin" > "$plan_json"
            echo "plan_path=$(realpath --relative-to="$GITHUB_WORKSPACE" "$plan_bin")" >> "$GITHUB_OUTPUT"
            echo "json_plan_path=$(realpath --relative-to="$GITHUB_WORKSPACE" "$plan_json")" >> "$GITHUB_OUTPUT"
          fi
          echo "text_plan_path=$(realpath --relative-to="$GITHUB_WORKSPACE" "$plan_text")" >> "$GITHUB_OUTPUT"

          nix shell --accept-flake-config --inputs-from "$GITHUB_WORKSPACE" nixpkgs#python3 --command \
            python3 - "$plan_json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import os
          import sys

          plan_path, output_path = sys.argv[1], sys.argv[2]
          counts = {
              "to_add": 0,
              "to_change": 0,
              "to_destroy": 0,
              "to_move": 0,
              "to_import": 0,
          }

          if os.path.exists(plan_path):
              with open(plan_path, encoding="utf-8") as handle:
                  plan = json.load(handle)
              for change in plan.get("resource_changes", []):
                  actions = change.get("change", {}).get("actions", [])
                  if actions == ["no-op"]:
                      continue
                  if "create" in actions:
                      counts["to_add"] += 1
                  if "update" in actions:
                      counts["to_change"] += 1
                  if "delete" in actions:
                      counts["to_destroy"] += 1
                  if actions == ["read"]:
                      counts["to_import"] += 1
                  if change.get("previous_address"):
                      counts["to_move"] += 1

          with open(output_path, "a", encoding="utf-8") as output:
              for key, value in counts.items():
                  print(f"{key}={value}", file=output)
          PY

      - name: Post plan comment
        if: steps.plan.outputs.text_plan_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN_CHANGED: ${{ steps.plan.outputs.changes }}
          PLAN_TEXT_PATH: ${{ steps.plan.outputs.text_plan_path }}
          TO_ADD: ${{ steps.plan.outputs.to_add }}
          TO_CHANGE: ${{ steps.plan.outputs.to_change }}
          TO_DESTROY: ${{ steps.plan.outputs.to_destroy }}
          TO_MOVE: ${{ steps.plan.outputs.to_move }}
          TO_IMPORT: ${{ steps.plan.outputs.to_import }}
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail

          marker="<!-- mcl-terraform-plan:${WORKING_DIRECTORY} -->"
          comments_api="repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments"

          if [[ "$PLAN_TEXT_PATH" = /* ]]; then
            plan_text="$PLAN_TEXT_PATH"
          else
            plan_text="$GITHUB_WORKSPACE/$PLAN_TEXT_PATH"
          fi

          if [ ! -f "$plan_text" ]; then
            echo "::error::Plan text output does not exist: $plan_text"
            exit 1
          fi

          comment_body="$(mktemp)"
          display_plan="$(mktemp)"
          max_plan_bytes=52000

          if [ "$(wc -c < "$plan_text")" -gt "$max_plan_bytes" ]; then
            head -c "$max_plan_bytes" "$plan_text" > "$display_plan"
            {
              echo
              echo
              echo "... plan output truncated in PR comment; see the workflow artifact/log for the full output."
            } >> "$display_plan"
          else
            cp "$plan_text" "$display_plan"
          fi

          if [ "$PLAN_CHANGED" = "true" ]; then
            result="Changes detected"
          else
            result="No changes"
          fi

          {
            echo "$marker"
            echo "### Terraform Plan: \`${WORKING_DIRECTORY}\`"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${result} |"
            echo "| Add | ${TO_ADD:-0} |"
            echo "| Change | ${TO_CHANGE:-0} |"
            echo "| Destroy | ${TO_DESTROY:-0} |"
            echo "| Move | ${TO_MOVE:-0} |"
            echo "| Import/read | ${TO_IMPORT:-0} |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Run | [${GITHUB_RUN_ID}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}) |"
            echo
            echo "<details><summary>Plan output</summary>"
            echo
            echo '```text'
            cat "$display_plan"
            echo '```'
            echo
            echo "</details>"
          } > "$comment_body"

          existing_comment_id="$(
            gh api "$comments_api" --paginate \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
              | tail -n 1
          )"

          body="$(cat "$comment_body")"
          if [ -n "$existing_comment_id" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_comment_id}" \
              -f body="$body" >/dev/null
          else
            gh api -X POST "$comments_api" -f body="$body" >/dev/null
          fi

      - name: Plan safety gate — destroy
        if: steps.plan.outputs.to_destroy > 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name' | grep -q 'allow-destroy'; then
            echo "::error::Plan includes destroy actions. Add the 'allow-destroy' label and get extra approval to proceed."
            exit 1
          fi

      - name: Plan safety gate — replace
        if: steps.plan.outputs.json_plan_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PLAN_JSON="${{ steps.plan.outputs.json_plan_path }}"
          if [ ! -f "$PLAN_JSON" ]; then
            exit 0
          fi
          # Detect resources with replace actions (create + delete)
          REPLACES=$(nix shell --accept-flake-config --inputs-from "$GITHUB_WORKSPACE" nixpkgs#python3 --command python3 -c "
          import json, sys
          plan = json.load(open(sys.argv[1]))
          replaces = [
              rc['address']
              for rc in plan.get('resource_changes', [])
              if set(rc.get('change', {}).get('actions', [])) >= {'create', 'delete'}
          ]
          if replaces:
              for r in replaces:
                  print(f'  - {r}')
              sys.exit(1)
          " "$PLAN_JSON" 2>&1) || {
            echo "::error::Plan includes replace actions (delete + recreate) on these resources:"
            echo "$REPLACES"
            echo "Add the 'allow-destroy' label and get extra approval to proceed."
            if ! gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name' | grep -q 'allow-destroy'; then
              exit 1
            fi
          }

      - name: Plan JSON policy gate
        if: steps.plan.outputs.json_plan_path != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch policy script from nixos-modules
          WORKFLOW_REF="${{ github.action_ref || 'main' }}"
          POLICY_SCRIPT_URL="https://raw.githubusercontent.com/metacraft-labs/nixos-modules/${WORKFLOW_REF}/scripts/tofu-plan-policy.py"
          curl -fsSL "$POLICY_SCRIPT_URL" -o /tmp/tofu-plan-policy.py

          PLAN_JSON="${{ steps.plan.outputs.json_plan_path }}"
          POLICY_ARGS=()

          # Check PR labels for policy mode
          LABELS=$(gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name' 2>/dev/null || echo "")

          if echo "$LABELS" | grep -q 'import-only'; then
            POLICY_ARGS+=(--mode import-only)
          fi

          if echo "$LABELS" | grep -q 'scope-expansion'; then
            POLICY_ARGS+=(--scope-expansion)
          fi

          # Run policy check
          nix shell --accept-flake-config --inputs-from "$GITHUB_WORKSPACE" nixpkgs#python3 --command \
            python3 /tmp/tofu-plan-policy.py "$PLAN_JSON" "${POLICY_ARGS[@]}"

      - name: Sensitive-change gate
        if: inputs.sensitive_change_label != '' && steps.plan.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh pr view "${{ github.event.pull_request.number }}" --json labels -q '.labels[].name' | grep -q '${{ inputs.sensitive_change_label }}'; then
            echo "::error::Plan shows changes that may be sensitive. Add the '${{ inputs.sensitive_change_label }}' label to acknowledge."
            exit 1
          fi

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ci-key"

  # ---------------------------------------------------------------------------
  # Job 3: Apply (merge-to-target-branch mode only)
  # Uses a GitHub Environment as the apply credential boundary. Consuming repos
  # decide whether that environment also has reviewer protection rules.
  # ---------------------------------------------------------------------------
  apply:
    if: >-
      inputs.mode == 'apply'
      && (inputs.credentials_env_name != '' || inputs.agenix_apply_secret_path != '' || inputs.aws_apply_role_arn != '')
    needs: offline-checks
    runs-on: ${{ fromJSON(inputs.runner) }}
    environment: ${{ inputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Lockfile existence gate
        run: |
          if [ ! -f "${{ inputs.working_directory }}/.terraform.lock.hcl" ]; then
            echo "::error::.terraform.lock.hcl is missing. Run 'tofu init' locally and commit the lockfile."
            exit 1
          fi

      - name: Decrypt provider credentials
        if: inputs.agenix_apply_secret_path != ''
        env:
          AGENIX_SECRET_PATH: ${{ inputs.agenix_apply_secret_path }}
          CREDENTIALS_ENV_NAME: ${{ inputs.credentials_env_name }}
        run: |
          set -euo pipefail

          if [ -z "$CREDENTIALS_ENV_NAME" ]; then
            echo "::error::credentials_env_name must be set when agenix_apply_secret_path is set."
            exit 1
          fi

          token_file="$(mktemp "$RUNNER_TEMP/provider-token.XXXXXX")"
          trap 'rm -f "$token_file"' EXIT

          install -m 600 /dev/null "$RUNNER_TEMP/ci-key"
          printf '%s\n' "${{ secrets.AGENIX_CI_PRIVATE_KEY }}" > "$RUNNER_TEMP/ci-key"
          if [ ! -s "$RUNNER_TEMP/ci-key" ]; then
            echo "::error::AGENIX_CI_PRIVATE_KEY is empty or unavailable."
            exit 1
          fi

          nix develop --accept-flake-config --command bash -euo pipefail -c \
            "age -d -i \"\$1\" \"\$2\" > \"\$3\"" \
            bash "$RUNNER_TEMP/ci-key" "$AGENIX_SECRET_PATH" "$token_file" >/dev/null

          TOKEN="$(<"$token_file")"
          if [ -z "$TOKEN" ]; then
            echo "::error::Decrypted provider credential is empty."
            exit 1
          fi
          if [[ "$TOKEN" == *$'\n'* || "$TOKEN" == *$'\r'* ]]; then
            echo "::error::Decrypted provider credential must be a single line."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          {
            printf '%s<<__MCL_TERRAFORM_SECRET__\n' "$CREDENTIALS_ENV_NAME"
            printf '%s\n' "$TOKEN"
            printf '__MCL_TERRAFORM_SECRET__\n'
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials for apply
        if: inputs.aws_apply_role_arn != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_apply_role_arn }}
          role-session-name: terraform-apply-${{ github.run_id }}
          role-duration-seconds: ${{ inputs.aws_role_duration_seconds }}

      - name: Terranix
        if: inputs.terranix
        run: |
          cd ${{ inputs.working_directory }}
          NIXPKGS=$(nix eval --raw nixpkgs#path --inputs-from . --accept-flake-config)
          nix develop --accept-flake-config --command bash -c "terranix --pkgs '$NIXPKGS' > config.tf.json"

      - name: Apply
        id: apply
        env:
          BACKEND_CONFIG_FILE: ${{ inputs.backend_config_file }}
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail

          backend_config_files="${BACKEND_CONFIG_FILE:-}"
          apply_id="$(printf '%s' "$WORKING_DIRECTORY" | tr '/[:space:]' '--')"
          apply_dir="$GITHUB_WORKSPACE/.result/terraform-apply/$apply_id"
          mkdir -p "$apply_dir"

          cd "$WORKING_DIRECTORY"

          backend_args=()
          while IFS= read -r backend_config_file; do
            [ -n "$backend_config_file" ] || continue
            if [[ "$backend_config_file" = /* ]]; then
              backend_path="$backend_config_file"
            else
              backend_path="$GITHUB_WORKSPACE/$backend_config_file"
            fi
            if [ ! -f "$backend_path" ]; then
              echo "::error::Backend config file does not exist: $backend_path"
              exit 1
            fi
            backend_args+=("-backend-config=$(realpath --relative-to="$PWD" "$backend_path")")
          done < <(printf '%s\n' "$backend_config_files" | tr ',' '\n')

          tofu_bin="$(nix develop --accept-flake-config --command bash -euo pipefail -c 'command -v tofu' | tail -n 1)"
          run_tofu() {
            env -u AWS_PROFILE -u AWS_DEFAULT_PROFILE "$tofu_bin" "$@"
          }

          run_tofu init -input=false "${backend_args[@]}"

          plan_bin="$apply_dir/plan.tfplan"
          plan_text="$apply_dir/plan.txt"
          plan_stderr="$apply_dir/plan.stderr"
          apply_text="$apply_dir/apply.txt"
          apply_stderr="$apply_dir/apply.stderr"

          set +e
          run_tofu plan \
            -input=false \
            -no-color \
            -lock-timeout=300s \
            -detailed-exitcode \
            -out="$plan_bin" \
            >"$plan_text" 2>"$plan_stderr"
          plan_exit=$?
          set -e

          cat "$plan_text"
          cat "$plan_stderr" >&2

          if [ "$plan_exit" -eq 0 ]; then
            echo "No changes to apply."
            exit 0
          fi
          if [ "$plan_exit" -ne 2 ]; then
            exit "$plan_exit"
          fi

          set +e
          run_tofu apply \
            -input=false \
            -no-color \
            -auto-approve \
            -lock-timeout=300s \
            "$plan_bin" \
            >"$apply_text" 2>"$apply_stderr"
          apply_exit=$?
          set -e

          cat "$apply_text"
          cat "$apply_stderr" >&2

          if [ "$apply_exit" -ne 0 ]; then
            echo "failure-reason=apply-failed" >> "$GITHUB_OUTPUT"
            exit "$apply_exit"
          fi

      - name: Post-apply smoke tests
        if: inputs.smoke_test_command != ''
        run: ${{ inputs.smoke_test_command }}

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ci-key"

  # ---------------------------------------------------------------------------
  # Job 4: Drift detection (scheduled mode only)
  # Runs tofu plan with -detailed-exitcode and opens an issue if drift found.
  # ---------------------------------------------------------------------------
  drift-check:
    if: >-
      inputs.mode == 'drift'
      && (inputs.credentials_env_name != '' || inputs.agenix_plan_secret_path != '' || inputs.aws_plan_role_arn != '' || inputs.aws_drift_role_arn != '')
    needs: offline-checks
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Decrypt provider credentials
        if: inputs.agenix_plan_secret_path != ''
        env:
          AGENIX_SECRET_PATH: ${{ inputs.agenix_plan_secret_path }}
          CREDENTIALS_ENV_NAME: ${{ inputs.credentials_env_name }}
        run: |
          set -euo pipefail

          if [ -z "$CREDENTIALS_ENV_NAME" ]; then
            echo "::error::credentials_env_name must be set when agenix_plan_secret_path is set."
            exit 1
          fi

          token_file="$(mktemp "$RUNNER_TEMP/provider-token.XXXXXX")"
          trap 'rm -f "$token_file"' EXIT

          install -m 600 /dev/null "$RUNNER_TEMP/ci-key"
          printf '%s\n' "${{ secrets.AGENIX_CI_PRIVATE_KEY }}" > "$RUNNER_TEMP/ci-key"
          if [ ! -s "$RUNNER_TEMP/ci-key" ]; then
            echo "::error::AGENIX_CI_PRIVATE_KEY is empty or unavailable."
            exit 1
          fi

          nix develop --accept-flake-config --command bash -euo pipefail -c \
            "age -d -i \"\$1\" \"\$2\" > \"\$3\"" \
            bash "$RUNNER_TEMP/ci-key" "$AGENIX_SECRET_PATH" "$token_file" >/dev/null

          TOKEN="$(<"$token_file")"
          if [ -z "$TOKEN" ]; then
            echo "::error::Decrypted provider credential is empty."
            exit 1
          fi
          if [[ "$TOKEN" == *$'\n'* || "$TOKEN" == *$'\r'* ]]; then
            echo "::error::Decrypted provider credential must be a single line."
            exit 1
          fi

          echo "::add-mask::$TOKEN"
          {
            printf '%s<<__MCL_TERRAFORM_SECRET__\n' "$CREDENTIALS_ENV_NAME"
            printf '%s\n' "$TOKEN"
            printf '__MCL_TERRAFORM_SECRET__\n'
          } >> "$GITHUB_ENV"

      - name: Configure AWS credentials for drift
        if: inputs.aws_plan_role_arn != '' || inputs.aws_drift_role_arn != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.aws_drift_role_arn != '' && inputs.aws_drift_role_arn || inputs.aws_plan_role_arn }}
          role-session-name: terraform-drift-${{ github.run_id }}
          role-duration-seconds: ${{ inputs.aws_role_duration_seconds }}

      - name: Terranix
        if: inputs.terranix
        run: |
          cd ${{ inputs.working_directory }}
          NIXPKGS=$(nix eval --raw nixpkgs#path --inputs-from . --accept-flake-config)
          nix develop --accept-flake-config --command bash -c "terranix --pkgs '$NIXPKGS' > config.tf.json"

      - name: Init
        env:
          BACKEND_CONFIG_FILE: ${{ inputs.backend_config_file }}
          WORKING_DIRECTORY: ${{ inputs.working_directory }}
        run: |
          set -euo pipefail

          backend_config_files="${BACKEND_CONFIG_FILE:-}"

          cd "$WORKING_DIRECTORY"

          backend_args=()
          while IFS= read -r backend_config_file; do
            [ -n "$backend_config_file" ] || continue
            if [[ "$backend_config_file" = /* ]]; then
              backend_path="$backend_config_file"
            else
              backend_path="$GITHUB_WORKSPACE/$backend_config_file"
            fi
            if [ ! -f "$backend_path" ]; then
              echo "::error::Backend config file does not exist: $backend_path"
              exit 1
            fi
            backend_args+=("-backend-config=$(realpath --relative-to="$PWD" "$backend_path")")
          done < <(printf '%s\n' "$backend_config_files" | tr ',' '\n')

          tofu_bin="$(nix develop --accept-flake-config --command bash -euo pipefail -c 'command -v tofu' | tail -n 1)"
          env -u AWS_PROFILE -u AWS_DEFAULT_PROFILE "$tofu_bin" init -input=false "${backend_args[@]}"

      - name: Detect drift
        id: drift
        run: |
          set -euo pipefail

          cd ${{ inputs.working_directory }}
          tofu_bin="$(nix develop --accept-flake-config --command bash -euo pipefail -c 'command -v tofu' | tail -n 1)"
          run_tofu() {
            env -u AWS_PROFILE -u AWS_DEFAULT_PROFILE "$tofu_bin" "$@"
          }

          set +e
          run_tofu plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            > /tmp/drift-plan.txt 2>&1
          plan_exit=$?
          set -e

          cat /tmp/drift-plan.txt

          if [ "$plan_exit" -eq 0 ]; then
            exit 0
          fi

          if [ "$plan_exit" -eq 2 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Infrastructure drift detected!"
            exit 0
          fi

          exit "$plan_exit"

      - name: Open drift issue
        if: steps.drift.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PLAN_OUTPUT="$(cat /tmp/drift-plan.txt)"
          gh issue create \
            --title "Infrastructure drift detected in ${{ inputs.working_directory }}" \
            --body "Scheduled drift detection found changes. Review the plan output and reconcile.

          \`\`\`
          $PLAN_OUTPUT
          \`\`\`" \
            --label "drift"

      - name: Cleanup credentials
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/ci-key"
