name: 'ci-matrix'

on:
  # Allow this workflow to be reused by other workflows:
  workflow_call:
    inputs:
      runners:
        description: 'JSON-encoded map of nix system to a list of runner labels'
        default: | # json
          {
            "x86_64-linux": [
              "self-hosted",
              "nixos",
              "x86-64-v3",
              "bare-metal"
            ],
            "aarch64-darwin": [
              "self-hosted",
              "macOS",
              "aarch64-darwin"
            ]
          }
        required: false
        type: string
      non-nix-runner:
        description: 'JSON-encoded runner labels for non-nix tasks (initial comment, mcl reference compute)'
        default: '["self-hosted", "nixos", "x86-64-v2", "bare-metal"]'
        required: false
        type: string
      results-runner:
        description: 'JSON-encoded runner labels for Final Results and deploy orchestration'
        default: '["self-hosted", "nixos", "x86-64-v2", "bare-metal"]'
        required: false
        type: string
      push-deployment-caches:
        description: 'Push deployment target closures to configured deployment cache backends'
        default: false
        required: false
        type: 'boolean'
      deployment-cache-push-backends:
        description: 'Comma-separated cache push backends for deployment closures: attic, none'
        default: 'attic'
        required: false
        type: string
      deployment-cache-required-backends:
        description: 'Comma-separated attempted cache push backends that must succeed'
        default: 'attic'
        required: false
        type: string
      deployment-cache-optional-timeout-seconds:
        description: 'Maximum seconds for each optional cache backend command'
        default: '300'
        required: false
        type: string
    secrets:
      ATTIC_TOKEN:
        description: 'Attic push token for optional deployment closure mirroring'
        required: false
      NIX_GITHUB_TOKEN:
        description: GitHub token to add as access-token in nix.conf
        required: false
      NIX_GITLAB_TOKEN:
        description: GitLab token to add as access-token in nix.conf
        required: false

jobs:
  compute-mcl-ref:
    name: Compute MCL Reference
    runs-on: ${{ fromJSON(inputs.non-nix-runner) }}
    outputs:
      workflow_sha: ${{ steps.compute.outputs.workflow_sha }}
      mcl_flake_cmd: ${{ steps.compute.outputs.mcl_flake_cmd }}
    steps:
      - name: Compute reusable workflow SHA and set mcl nix run command
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          is_commit_sha() {
            [[ "$1" =~ ^[0-9a-fA-F]{40}$ ]]
          }

          workflow_repo=""
          case "${GITHUB_WORKFLOW_REF:-}" in
            metacraft-labs/nixos-modules/.github/workflows/reusable-flake-checks-ci-matrix.yml@*)
              workflow_repo="metacraft-labs/nixos-modules"
              ;;
          esac

          mcl_ref=""

          if [[ "${GITHUB_REPOSITORY:-}" == "metacraft-labs/nixos-modules" ]] &&
            is_commit_sha "${GITHUB_SHA:-}"; then
            # Local calls from nixos-modules PRs should test the PR commit.
            mcl_ref="$GITHUB_SHA"
          elif [[ "$workflow_repo" == "metacraft-labs/nixos-modules" ]] &&
            is_commit_sha "${GITHUB_WORKFLOW_SHA:-}"; then
            mcl_ref="$GITHUB_WORKFLOW_SHA"
          else
            echo "::warning title=MCL workflow ref fallback::Could not read a valid nixos-modules workflow SHA from GitHub Actions context; using main"
            mcl_ref="main"
          fi

          if ! is_commit_sha "$mcl_ref" && [[ "$mcl_ref" != "main" ]]; then
            echo "::warning title=Invalid MCL workflow ref::Ignoring invalid workflow ref '$mcl_ref'; using main"
            mcl_ref="main"
          fi

          {
            printf 'workflow_sha=%s\n' "$mcl_ref"
            printf 'mcl_flake_cmd=nix run --accept-flake-config github:metacraft-labs/nixos-modules/%s#mcl\n' "$mcl_ref"
          } >> "$GITHUB_OUTPUT"

  post-initial-comment:
    if: github.event_name == 'pull_request'
    runs-on: ${{ fromJSON(inputs.non-nix-runner) }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: 'Post initial package status comment'
        uses: metacraft-labs/nixos-modules/.github/sticky-comment@main
        with:
          message: |
            Thanks for your Pull Request!

            This comment will be updated automatically with the status of each package.

  shard-matrix:
    needs: compute-mcl-ref
    runs-on: ${{ fromJSON(inputs.runners).x86_64-linux }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with: &setup-nix-no-push
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}

      - uses: actions/checkout@v6.0.2

      - name: Generate Shard Matrix
        id: generate-matrix
        env:
          EXTRA_CACHE_URLS: ${{ vars.SUBSTITUTERS }}
          SYSTEM_TO_GITHUB_RUNNER_LABELS: ${{ inputs.runners }}
        run: ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }} shard-matrix

      - name: Post CI matrix comment
        if: steps.generate-matrix.outputs.full_matrix
        uses: metacraft-labs/nixos-modules/.github/sticky-comment@main
        with:
          path: comment.md

    outputs:
      eval_matrix: ${{ steps.generate-matrix.outputs.eval_matrix }}
      build_matrix: ${{ steps.generate-matrix.outputs.build_matrix }}
      full_matrix: ${{ steps.generate-matrix.outputs.full_matrix }}

  eval-matrix:
    needs: [compute-mcl-ref, shard-matrix]
    runs-on: ${{ fromJSON(inputs.runners).x86_64-linux }}
    if: needs.shard-matrix.outputs.eval_matrix
    strategy:
      matrix: ${{fromJSON(needs.shard-matrix.outputs.eval_matrix)}}
    steps:
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}

      - uses: actions/checkout@v6.0.2

      - name: Generate CI Matrix
        id: generate-matrix
        shell: bash
        env:
          EXTRA_CACHE_URLS: ${{ vars.SUBSTITUTERS }}
          SYSTEM_TO_GITHUB_RUNNER_LABELS: ${{ inputs.runners }}
        run: |
          ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }} -- ci-matrix \
            --flake-attribute-path "${{ matrix.flakeAttrPath }}" \
            --is-initial

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.filename }}
          path: matrix-pre.json
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}

  merge-matrices:
    runs-on: ${{ fromJSON(inputs.runners).x86_64-linux }}
    needs: [compute-mcl-ref, shard-matrix, eval-matrix]
    name: Merge matrices
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      build_matrix: ${{ steps.merge.outputs.build_matrix }}
      full_matrix: ${{ steps.merge.outputs.full_matrix }}
    if: needs.shard-matrix.outputs.eval_matrix != '{"include":[]}' &&
      needs.eval-matrix.result == 'success'
    steps:
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}

      - uses: actions/download-artifact@v8
        if: needs.eval-matrix.result == 'success'
        continue-on-error: true

      - name: Regenerate CI matrix shards when artifacts are unavailable
        if: needs.eval-matrix.result == 'success'
        shell: bash
        env:
          EVAL_MATRIX: ${{ needs.shard-matrix.outputs.eval_matrix }}
          MCL_FLAKE_CMD: ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }}
          EXTRA_CACHE_URLS: ${{ vars.SUBSTITUTERS }}
          SYSTEM_TO_GITHUB_RUNNER_LABELS: ${{ inputs.runners }}
        run: |
          set -euo pipefail

          run_python() {
            if command -v python3 >/dev/null 2>&1; then
              python3 "$@"
            else
              nix shell nixpkgs#python3 --command python3 "$@"
            fi
          }

          expected="$(
            printf '%s' "$EVAL_MATRIX" |
              run_python -c 'import json, sys; print(len(json.load(sys.stdin).get("include", [])))'
          )"
          actual="$(find . -mindepth 2 -maxdepth 2 -type f -name matrix-pre.json | wc -l)"
          actual="${actual//[[:space:]]/}"

          if [[ "$actual" == "$expected" ]]; then
            echo "Found all $actual CI matrix shard artifact(s)."
            exit 0
          fi

          echo "::warning title=Regenerating CI matrix shards::found $actual of $expected shard artifacts; regenerating locally"
          read -r -a mcl_cmd <<< "$MCL_FLAKE_CMD"

          while IFS=$'\t' read -r filename flake_attr_path; do
            [[ -n "$filename" && -n "$flake_attr_path" ]] || continue

            artifact_dir="${filename%.json}"
            rm -rf -- "$artifact_dir" matrix-pre.json

            "${mcl_cmd[@]}" -- ci-matrix \
              --flake-attribute-path "$flake_attr_path" \
              --is-initial

            mkdir -p "$artifact_dir"
            mv matrix-pre.json "$artifact_dir/matrix-pre.json"
          done < <(
            printf '%s' "$EVAL_MATRIX" |
              run_python -c 'import json, sys; [print("{}\t{}".format(shard.get("filename", ""), shard.get("flakeAttrPath", ""))) for shard in json.load(sys.stdin).get("include", [])]'
          )

      - name: Merge matrices
        if: needs.eval-matrix.result == 'success'
        id: merge
        run: ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }} merge-ci-matrices

      - name: Generate CI matrix comment
        env:
          IS_INITIAL: 'true'
          EXTRA_CACHE_URLS: ${{ vars.SUBSTITUTERS }}
          PRECALC_MATRIX: ${{ steps.merge.outputs.full_matrix }}
        run: ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }} print-table

      - name: Post CI matrix comment
        uses: metacraft-labs/nixos-modules/.github/sticky-comment@main
        with:
          path: comment.md

  build:
    needs: [compute-mcl-ref, shard-matrix, merge-matrices]
    if: always()
    strategy:
      fail-fast: false
      matrix: >-
        ${{fromJSON(
          (
            needs.merge-matrices.result == 'success' &&
            needs.merge-matrices.outputs.build_matrix &&
            needs.merge-matrices.outputs.build_matrix != '{"include":[]}' &&
            needs.merge-matrices.outputs.build_matrix
          ) ||
          (
            needs.shard-matrix.outputs.build_matrix &&
            needs.shard-matrix.outputs.build_matrix != '{"include":[]}' &&
            needs.shard-matrix.outputs.build_matrix
          ) ||
          format(
            '{{"include":[{{"name":"no-builds-required","system":"x86_64-linux","ghRunner":{0},"allowedToFail":false,"noop":true}}]}}',
            toJSON(fromJSON(inputs.runners).x86_64-linux)
          )
        )}}

    name: ${{ matrix.name }} | ${{ matrix.system }}
    runs-on: ${{ matrix.ghRunner }}
    continue-on-error: ${{ matrix.allowedToFail }}

    steps:
      - name: No builds required
        if: ${{ matrix.noop }}
        run: |
          echo "All evaluated outputs were already present in the configured caches."

      - uses: actions/checkout@v6.0.2
        if: ${{ !matrix.noop }}

      - name: Setup Nix
        if: ${{ !matrix.noop }}
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}

      - name: Build ${{ matrix.name }}
        if: ${{ !matrix.noop }}
        run: |
          nix build -L --no-link --keep-going --show-trace \
            '.#${{ matrix.attrPath }}'

      # Cache push runs only when the caller requests deployment cache
      # publication.
      # On PR check runs the build itself already validates that the closure
      # is buildable; redoing the push + per-path substitute probe on every
      # matrix job would multiply runtime by 10x — a single NixOS system
      # closure has thousands of paths and the probe's nix-copy fallback
      # has timed out 6h+ jobs in the past (infra#965 first attempt).
      - name: Push deployment closure caches ${{ matrix.name }}
        if: ${{ inputs.push-deployment-caches && !matrix.noop && matrix.deploymentTarget }}
        shell: bash
        env:
          DEPLOY_TARGET: ${{ matrix.name }}
          DEPLOY_SYSTEM: ${{ matrix.system }}
          DEPLOY_KIND: ${{ matrix.deploymentKind }}
          DEPLOY_STORE_PATH: ${{ matrix.output }}
          DEPLOYMENT_CACHE_PUSH_BACKENDS: ${{ inputs.deployment-cache-push-backends }}
          DEPLOYMENT_CACHE_REQUIRED_BACKENDS: ${{ inputs.deployment-cache-required-backends }}
          DEPLOYMENT_CACHE_OPTIONAL_TIMEOUT_SECONDS: ${{ inputs.deployment-cache-optional-timeout-seconds }}
          ATTIC_CACHE: ${{ vars.ATTIC_CACHE }}
          ATTIC_SUBSTITUTER: ${{ vars.ATTIC_SUBSTITUTER }}
          ATTIC_ENDPOINT: ${{ vars.ATTIC_ENDPOINT }}
          ATTIC_TRUSTED_PUBLIC_KEY: ${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          DEPLOYMENT_TRUSTED_PUBLIC_KEYS: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          DEPLOYMENT_TRUSTED_SUBSTITUTERS: ${{ vars.SUBSTITUTERS }}
        run: |
          set -u -o pipefail

          mkdir -p .result

          trim_csv_value() {
            local value="$1"
            shopt -s extglob
            value="${value##+([[:space:]])}"
            value="${value%%+([[:space:]])}"
            shopt -u extglob
            printf '%s' "$value"
          }

          backend_is_required() {
            local wanted="$1"
            local required
            IFS=',' read -ra required_backends <<< "$DEPLOYMENT_CACHE_REQUIRED_BACKENDS"
            for required in "${required_backends[@]}"; do
              required="$(trim_csv_value "$required")"
              [[ -n "$required" ]] || continue
              if [[ "$required" == "$wanted" ]]; then
                return 0
              fi
            done
            return 1
          }

          warn_optional_backend() {
            local backend="$1"
            local message="$2"
            echo "::warning title=Optional deployment cache backend::backend=$backend $message"
          }

          require_backend_vars() {
            local backend="$1"
            local required="$2"
            shift 2
            local missing=()
            local name
            for name in "$@"; do
              if [[ -z "${!name:-}" ]]; then
                missing+=("$name")
              fi
            done

            if [[ "${#missing[@]}" -eq 0 ]]; then
              return 0
            fi

            local message
            message="${missing[*]} required when deployment-cache-push-backends includes $backend"
            if [[ "$required" == true ]]; then
              echo "$message" >&2
              exit 1
            fi

            warn_optional_backend "$backend" "$message; continuing without this mirror backend"
            return 1
          }

          run_backend_command() {
            local backend="$1"
            local required="$2"
            local label="$3"
            shift 3
            local exit_code

            if [[ "$required" == true ]]; then
              "$@"
              exit_code=$?
              if [[ "$exit_code" -ne 0 ]]; then
                echo "Required deployment cache backend $backend failed during $label (exit $exit_code)" >&2
                exit "$exit_code"
              fi
              return 0
            fi

            timeout --kill-after=30s "${DEPLOYMENT_CACHE_OPTIONAL_TIMEOUT_SECONDS}s" "$@"
            exit_code=$?
            if [[ "$exit_code" -eq 0 ]]; then
              return 0
            fi

            if [[ "$exit_code" -eq 124 || "$exit_code" -eq 137 || "$exit_code" -eq 143 ]]; then
              warn_optional_backend "$backend" "$label timed out after ${DEPLOYMENT_CACHE_OPTIONAL_TIMEOUT_SECONDS}s; continuing"
            else
              warn_optional_backend "$backend" "$label failed with exit $exit_code; continuing"
            fi
            return "$exit_code"
          }

          if [[ ! "$DEPLOYMENT_CACHE_OPTIONAL_TIMEOUT_SECONDS" =~ ^[1-9][0-9]*$ ]]; then
            echo "deployment-cache-optional-timeout-seconds must be a positive integer" >&2
            exit 1
          fi

          configure_attic_netrc() {
            attic_host="${ATTIC_SUBSTITUTER#http://}"
            attic_host="${attic_host#https://}"
            attic_host="${attic_host%%/*}"
            if [[ -z "$attic_host" ]]; then
              return 1
            fi

            nix_netrc="$HOME/.config/nix/netrc"
            mkdir -p "${nix_netrc%/*}"
            touch "$nix_netrc"
            chmod 0600 "$nix_netrc"

            has_attic_netrc_entry=false
            while read -r kind machine _; do
              if [[ "$kind" == "machine" && "$machine" == "$attic_host" ]]; then
                has_attic_netrc_entry=true
                break
              fi
            done < "$nix_netrc"

            if [[ "$has_attic_netrc_entry" == false ]]; then
              printf 'machine %s password %s\n' "$attic_host" "$ATTIC_TOKEN" >> "$nix_netrc"
            fi
          }

          IFS=',' read -ra backends <<< "$DEPLOYMENT_CACHE_PUSH_BACKENDS"
          for backend in "${backends[@]}"; do
            backend="$(trim_csv_value "$backend")"
            [[ -n "$backend" ]] || continue

            required=false
            if backend_is_required "$backend"; then
              required=true
            fi

            case "$backend" in
              attic)
                if ! require_backend_vars "$backend" "$required" ATTIC_TOKEN ATTIC_CACHE ATTIC_SUBSTITUTER ATTIC_TRUSTED_PUBLIC_KEY; then
                  continue
                fi

                if ! configure_attic_netrc; then
                  if [[ "$required" == true ]]; then
                    echo "Could not derive Attic host from ATTIC_SUBSTITUTER" >&2
                    exit 1
                  fi
                  warn_optional_backend "$backend" "could not derive Attic host from ATTIC_SUBSTITUTER; continuing"
                  continue
                fi

                attic_endpoint="${ATTIC_ENDPOINT:-}"
                if [[ -z "$attic_endpoint" ]]; then
                  attic_cache_suffix="/$ATTIC_CACHE"
                  attic_endpoint="${ATTIC_SUBSTITUTER%"$attic_cache_suffix"}"
                fi
                attic_endpoint="${attic_endpoint%/}/"
                if ! run_backend_command "$backend" "$required" "attic login" \
                  nix shell nixpkgs#attic-client -c \
                    attic login --set-default deployment "$attic_endpoint" "$ATTIC_TOKEN"
                then
                  continue
                fi

                cache="$ATTIC_CACHE"
                substituter="$ATTIC_SUBSTITUTER"
                ;;
              none)
                cache="none"
                substituter=""
                ;;
              *)
                echo "Unsupported deployment cache backend: $backend" >&2
                exit 1
                ;;
            esac

            trusted_args=()
            for key in $DEPLOYMENT_TRUSTED_PUBLIC_KEYS; do
              trusted_args+=(--trusted-public-key "$key")
            done
            if [[ "$backend" == attic ]]; then
              trusted_args+=(--trusted-public-key "$ATTIC_TRUSTED_PUBLIC_KEY")
            fi

            substituter_args=()
            if [[ -n "$substituter" ]]; then
              substituter_args+=(--substituter "$substituter" --require-substitute)
            fi
            if [[ "$backend" != attic ]]; then
              # Probe across every trusted substituter that target hosts
              # configure (deployment cache + auxiliary caches +
              # cache.nixos.org). The integrity check passes if ANY trusted
              # substituter resolves a path — matching the realistic deploy
              # environment instead of demanding exhaustive coverage on the
              # primary cache. Attic is excluded because its required proof
              # must show the Attic backend itself covers the closure.
              for extra_substituter in $DEPLOYMENT_TRUSTED_SUBSTITUTERS https://cache.nixos.org; do
                [[ "$extra_substituter" == "$substituter" ]] && continue
                substituter_args+=(--substituter "$extra_substituter")
              done
              # cache.nixos.org's signing key is universally trusted on NixOS
              # hosts; add it to the probe's trusted-public-keys list so
              # nix copy --from cache.nixos.org accepts the signatures.
              trusted_args+=(--trusted-public-key
                "cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=")
            fi

            if ! run_backend_command "$backend" "$required" "cache push and substitute probe" \
              ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }} -- cache push-closure \
              --backend "$backend" \
              --cache "$cache" \
              --target "$DEPLOY_TARGET" \
              --system "$DEPLOY_SYSTEM" \
              --kind "$DEPLOY_KIND" \
              --transport attic-ci \
              --event-log .result/deployment-cache-push-events.jsonl \
              "${substituter_args[@]}" \
              "${trusted_args[@]}" \
              "$DEPLOY_STORE_PATH"
            then
              continue
            fi
          done

      - uses: actions/upload-artifact@v7
        if: ${{ always() && inputs.push-deployment-caches && !matrix.noop && matrix.deploymentTarget }}
        continue-on-error: true
        with:
          name: deployment-cache-push-${{ github.run_id }}-${{ strategy.job-index }}
          path: .result/deployment-cache-push-events.jsonl
          if-no-files-found: warn

  results:
    runs-on: ${{ fromJSON(inputs.results-runner) }}
    name: Final Results
    needs: [compute-mcl-ref, build, shard-matrix, merge-matrices]
    if: always()
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}

      - name: Print CI Matrix
        env:
          IS_INITIAL: 'false'
          EXTRA_CACHE_URLS: ${{ vars.SUBSTITUTERS }}
          PRECALC_MATRIX: ${{
            needs.merge-matrices.result == 'success' &&
            needs.merge-matrices.outputs.full_matrix ||
            needs.shard-matrix.outputs.full_matrix
            }}
        run: ${{ needs.compute-mcl-ref.outputs.mcl_flake_cmd }} print-table

      - name: Update GitHub Comment
        uses: metacraft-labs/nixos-modules/.github/sticky-comment@main
        with:
          path: comment.md

      - run: exit 1
        if: >-
          (
            (
              needs.merge-matrices.result == 'success' &&
              needs.merge-matrices.outputs.build_matrix != '{"include":[]}'
            ) ||
              needs.shard-matrix.outputs.build_matrix != '{"include":[]}'
          ) && (
            contains(needs.*.result, 'failure') ||
            contains(needs.*.result, 'cancelled')
          )
