name: CI

on:
  # Allow this workflow to be triggered manually:
  workflow_dispatch:

  # Allow this workflow to be run in merge queues:
  merge_group:

  # Run this workflow when PRs target the active integration branches:
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/reusable-lint.yml
    secrets: inherit

  test-mcl:
    strategy:
      fail-fast: false
      # Test setup-nix's support for specifying which Nix version to install
      # on github-hosted runners
      matrix:
        include:
          - runner: incus
            nix-version: ''
          - runner: incus
            nix-version: 2.28.5
          - runner: incus
            nix-version: 2.33.0
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout first to use locally defined actions
        uses: actions/checkout@v6.0.2

      - name: Setup Nix
        uses: ./.github/setup-nix
        with:
          nix-version: ${{ matrix.nix-version }}
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          devshell: default

      - name: Build and test the `mcl` command
        run: dub test --root packages/mcl -- -e 'fetchJson|(coda\.)|nix.run|nix.build'

  # Regression test for the setup-nix action: a devShell that fails to build
  # must make the action fail (not silently report success and surface later as
  # an obscure "command not found"), while a working devShell must still be
  # exported to $GITHUB_ENV. Uses the fixture flake under
  # `.github/setup-nix/tests/devshell-fixture/`.
  test-setup-nix-devshell:
    name: Validate setup-nix devShell build-failure detection
    runs-on: incus
    steps:
      - name: Checkout first to use locally defined actions
        uses: actions/checkout@v6.0.2

      - name: Stage the devShell test fixture as the workspace flake
        run: |
          cp .github/setup-nix/tests/devshell-fixture/flake.nix ./flake.nix
          rm -f flake.lock

      - name: Setup Nix with a failing devShell (expected to fail)
        id: setup-failing
        continue-on-error: true
        uses: ./.github/setup-nix
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          devshell: failing

      - name: Assert the failing devShell was detected
        run: |
          if [ "${{ steps.setup-failing.outcome }}" != "failure" ]; then
            echo "::error::Setup Nix reported '${{ steps.setup-failing.outcome }}' for a devShell that fails to build; expected 'failure'."
            exit 1
          fi
          echo "OK: Setup Nix correctly failed when the devShell could not be built."

      - name: Setup Nix with a working devShell (expected to succeed)
        id: setup-working
        uses: ./.github/setup-nix
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          devshell: default

      - name: Assert the working devShell was exported to PATH
        run: |
          if ! command -v hello >/dev/null; then
            echo "::error::'hello' from the devShell is not on PATH; the environment was not exported to GITHUB_ENV."
            exit 1
          fi
          echo "OK: devShell environment exported; hello resolved to $(command -v hello)."

  test-mcl-secret-integration:
    runs-on: incus
    steps:
      - name: Checkout first to use locally defined actions
        uses: actions/checkout@v6.0.2

      - name: Setup Nix
        uses: ./.github/setup-nix
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Run mcl secret integration tests
        run: nix run .#checks.x86_64-linux.secret-integration

  ci:
    uses: ./.github/workflows/reusable-flake-checks-ci-matrix.yml
    permissions:
      contents: read
      issues: write
      pull-requests: write
    secrets: inherit
    with:
      runners: |
        {
          "x86_64-linux": [
            "incus"
          ],
          "aarch64-darwin": [
            "macos-tart"
          ]
        }

  # The `just act lint` step builds `ci-image` and runs the lint workflow inside
  # it via `act`, i.e. it needs nested Docker. This is exactly what the
  # `incus-nested` class provides (vmharness-nested: nested docker + nested KVM),
  # so this job targets that class rather than plain `incus`. It will queue until
  # an `incus-nested` runner is attached to the fleet.
  test-act:
    runs-on: incus-nested
    steps:
      - name: Checkout first to use locally defined actions
        uses: actions/checkout@v6.0.2

      - name: Setup Nix
        uses: ./.github/setup-nix
        with:
          push-to-cache: true
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          devshell: default

      - name: Create `.gh-vars.env` and `.gh-secrets.env` files
        run: |
          {
            echo 'ATTIC_ENDPOINT=${{ vars.ATTIC_ENDPOINT }}'
            echo 'ATTIC_CACHE=${{ vars.ATTIC_CACHE }}'
            echo 'ATTIC_SUBSTITUTER=${{ vars.ATTIC_SUBSTITUTER }}'
            echo 'ATTIC_TRUSTED_PUBLIC_KEY=${{ vars.ATTIC_TRUSTED_PUBLIC_KEY }}'
            echo 'SUBSTITUTERS=${{ vars.SUBSTITUTERS }}'
            echo 'TRUSTED_PUBLIC_KEYS=${{ vars.TRUSTED_PUBLIC_KEYS }}'
          } > .gh-vars.env

          {
            echo 'ATTIC_TOKEN=${{ secrets.ATTIC_TOKEN }}'
          } > .gh-secrets.env

      - name: Build `ci-image` and run the `lint` workflow inside it with `act`
        run: just act lint
