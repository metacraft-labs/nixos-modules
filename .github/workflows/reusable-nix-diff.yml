name: 'Nix Diff'

on:
  workflow_call:
    inputs:
      runner:
        description: 'JSON-encoded list of runner labels'
        default: '["self-hosted", "Linux", "x86-64-v2"]'
        required: false
        type: string
      machines-attr:
        description: 'Flake attribute to enumerate machines (must be an attrset of derivations)'
        default: 'legacyPackages.x86_64-linux.bareMetalMachines'
        required: false
        type: string
      base-input-overrides:
        description: 'Whitespace-separated flake input names to pin in the synthetic base branch to the PR lock before diffing'
        default: ''
        required: false
        type: string
    secrets:
      NIX_GITHUB_TOKEN:
        description: GitHub token to add as access-token in nix.conf
        required: false
      NIX_GITLAB_TOKEN:
        description: GitLab token to add as access-token in nix.conf
        required: false

jobs:
  nix-diff:
    if: github.event_name == 'pull_request'
    runs-on: ${{ fromJSON(inputs.runner) }}
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}

      - name: Discover machines and generate attributes
        id: discover
        run: |
          echo "::group::Discovering machines"
          machines=$(nix eval --json --accept-flake-config \
            --option warn-dirty false \
            --apply builtins.attrNames \
            '.#${{ inputs.machines-attr }}')
          echo "Found machines: $machines"
          echo "::endgroup::"

          # Generate nix-diff-action attributes YAML
          attrs=$(echo "$machines" | jq -r \
            '.[] | "- displayName: " + . + "\n  attribute: nixosConfigurations." + . + ".config.system.build.toplevel"')

          echo "attributes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$attrs" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Prepare synthetic base flake inputs
        if: inputs.base-input-overrides != ''
        shell: bash
        run: |
          set -euo pipefail

          base_ref='${{ github.event.pull_request.base.ref }}'
          override_inputs='${{ inputs.base-input-overrides }}'
          workspace="$(pwd)"
          tmp_root="${RUNNER_TEMP:-/tmp}/nix-diff-base-${GITHUB_RUN_ID}"
          base_worktree="$tmp_root/base"
          synthetic_origin="$tmp_root/origin.git"

          current_locked_ref() {
            local input="$1"

            nix flake metadata --json "$workspace" \
              | jq -r --arg input "$input" '
                .locks.nodes[.locks.nodes.root.inputs[$input]].locked as $locked
                | if $locked.type == "github" then
                    "github:\($locked.owner)/\($locked.repo)/\($locked.rev)"
                  elif $locked.type == "git" and ($locked.url // "") != "" then
                    "\($locked.url)?rev=\($locked.rev)"
                  elif $locked.type == "path" and ($locked.path // "") != "" then
                    "path:\($locked.path)"
                  else
                    empty
                  end
              '
          }

          rm -rf "$tmp_root"
          mkdir -p "$tmp_root"

          git fetch origin "+${base_ref}:refs/remotes/origin/${base_ref}"
          git worktree add --detach "$base_worktree" "origin/${base_ref}"

          lock_args=()
          for input in $override_inputs; do
            locked_ref="$(current_locked_ref "$input")"
            if [ -z "$locked_ref" ]; then
              echo "Could not resolve current locked ref for flake input: $input" >&2
              exit 1
            fi

            echo "Pinning base flake input '$input' to $locked_ref"
            lock_args+=(--override-input "$input" "$locked_ref")
          done

          (
            cd "$base_worktree"
            nix flake lock --accept-flake-config "${lock_args[@]}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config commit.gpgsign false
            git add flake.lock

            if git diff --cached --quiet; then
              echo "Base flake.lock already matches requested input overrides"
            else
              git commit -m "ci: synthesize base flake input overrides"
            fi
          )

          git init --bare "$synthetic_origin"
          git -C "$base_worktree" push "$synthetic_origin" "HEAD:refs/heads/${base_ref}"
          git remote set-url origin "$synthetic_origin"
          echo "Prepared synthetic origin/${base_ref} for nix-diff input overrides: $override_inputs"

      - name: Diff NixOS system closures
        id: nix-diff-full
        continue-on-error: true
        uses: natsukium/nix-diff-action@v1.1.0
        env:
          NIX_CONFIG: |
            experimental-features = nix-command flakes pipe-operators
        with:
          mode: full
          comment-strategy: update
          build: false
          attributes: ${{ steps.discover.outputs.attributes }}

      - name: Recompute nix-diff output after non-gating publish failure
        id: nix-diff-fallback
        if: steps.nix-diff-full.outcome == 'failure'
        continue-on-error: true
        uses: natsukium/nix-diff-action@v1.1.0
        env:
          NIX_CONFIG: |
            experimental-features = nix-command flakes pipe-operators
        with:
          mode: diff-only
          build: false
          attributes: ${{ steps.discover.outputs.attributes }}

      - name: Validate nix-diff fallback output
        if: steps.nix-diff-full.outcome == 'failure'
        env:
          FALLBACK_DIFF: ${{ steps.nix-diff-fallback.outputs.diff }}
        run: |
          if [[ -z "$FALLBACK_DIFF" ]]; then
            echo "nix-diff failed before producing diff output; this is not an artifact-only failure." >&2
            exit 1
          fi

          jq -e 'type == "array" and length > 0 and all(.[]; has("displayName") and has("diff"))' \
            <<<"$FALLBACK_DIFF" >/dev/null
          echo "nix-diff produced fallback output; treating artifact/comment publication failure as non-gating."
