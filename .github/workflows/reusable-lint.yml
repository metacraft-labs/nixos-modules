name: 'Lint'

on:
  # Allow this workflow to be reused by other workflows:
  workflow_call:
    inputs:
      runner:
        description: 'JSON-encoded runner class (single-name self-hosted class, e.g. "eph-linux-x64")'
        default: '["eph-linux-x64"]'
        required: false
        type: string

    secrets:
      NIX_GITHUB_TOKEN:
        description: GitHub token to add as access-token in nix.conf
        required: false
      NIX_GITLAB_TOKEN:
        description: GitLab token to add as access-token in nix.conf
        required: false

jobs:
  lint:
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ secrets.NIX_GITHUB_TOKEN }}
          nix-gitlab-token: ${{ secrets.NIX_GITLAB_TOKEN }}
          nix-gitlab-domain: ${{ vars.NIX_GITLAB_DOMAIN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Check formatting
        run: nix develop --accept-flake-config .#pre-commit -c prek run --all-files --show-diff-on-failure --color always
